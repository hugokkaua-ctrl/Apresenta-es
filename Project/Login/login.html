<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="Container">
        <div id="area" class="login_area">
            <h1>Cadastrar usuario</h1>

            <div class="formulario">
                <form onsubmit="submit()">
                    <div>
                        <label>Seu Nome</label>
                    </div>
                    <input type="text" id="nome" name="name" placeholder="Nome" />
                    <div>
                        <label>Sua Senha</label>
                    </div>
                    <input type="password" id="senha" name="passowrd" placeholder="Senha" />


                    <div id="recuperar_senha">
                        <span>Esqueceu a senha?</span>
                    </div>

                    <div id="btn_enviar">
                        <button type="submit" onclick="envia()">Enviar</button>
                    </div>
                </form>

                <div class="divisor">
                    <p><span></span> ou continue com <span></span></p>
                </div>

                <div class="contato">
                    <a href="">Google <i class="fa-brands fa-google"></i></a>

                    <a href="">Facebook <i class="fa-brands fa-facebook"></i></a>
                </div>

                <button onclick="mudar_dark()" id="claro" class="tema1">
                    <i class="fa-solid fa-sun"></i>
                </button>

                <button id="dark" onclick="mudar_claro()" class="tema2">
                    <i class=" fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </div>
</body>

<script src="login.js"></script>

</html>
