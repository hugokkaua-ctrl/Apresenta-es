<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./Clima.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="./img/Favicon.jpeg" type="image/x-icon">
</head>

<body onload="HorasDate()">
    <div class="Clima">
        <div>
            <input type="text" id="cidade" name="cidade" placeholder="Fale sua cidade/Estado" />
            <button id="butao" onclick="enviar()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <img style="width: 150px; margin-top:1em; margin-bottom: 0;" src="./img/ensolarado.png" alt="">
        <h1 id="temperatura">27°c</h1>
        <h2 id="local">MINAS GERAIS</h2>
        <p id="condicao">condiçoes</p>

        <div id="claro">
            <a onclick="claros()"><i class=" fa-solid fa-sun"></i></a>
        </div>

        <div id="escuro">
            <a onclick="escuros()"><i class="fa-solid fa-moon"></i></a>
        </div>
    </div>

    <!-- horas e data -->
    <div class="Horas">
        <h2 id="hora">0</h2>
    </div>

    <div class="Data">
        <h2 id="data"></h2>

        <h3 id="semana"> </h3>
    </div>
</body>
<script src="clima.js">
</script>

</html>
